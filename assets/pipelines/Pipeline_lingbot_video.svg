<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">LingBot-Video pipeline</title>
  <desc id="desc">A compact pipeline diagram showing robot video data, MoE video pretraining, reward alignment, and RL post-training.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eefaf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#205488"/>
      <stop offset="1" stop-color="#20a37f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#205488" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="34" fill="url(#bg)"/>
  <path d="M85 90 C190 34 305 60 390 118 C505 196 612 155 735 92 C785 67 834 66 870 80 L870 0 L0 0 L0 130 C25 124 52 108 85 90 Z" fill="#dcecff" opacity="0.7"/>
  <path d="M54 428 C158 376 252 410 362 454 C489 505 598 468 716 414 C780 385 838 379 900 402 L900 520 L0 520 L0 454 C16 445 34 438 54 428 Z" fill="#dcf7ec" opacity="0.75"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="78" font-size="34" font-weight="800" fill="#17324d">LingBot-Video</text>
    <text x="62" y="108" font-size="16" font-weight="600" fill="#55708a">MoE video pretraining for embodied intelligence</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <g transform="translate(54 166)">
      <rect width="190" height="154" rx="22" fill="#ffffff" stroke="#d7e4ef"/>
      <rect x="24" y="26" width="142" height="82" rx="14" fill="#e9f3ff"/>
      <circle cx="72" cy="67" r="19" fill="#205488" opacity="0.9"/>
      <rect x="96" y="47" width="44" height="40" rx="10" fill="#20a37f"/>
      <path d="M54 108 L78 84 L104 105 L125 87 L166 126 L24 126 Z" fill="#b9d7ef"/>
      <text x="24" y="138" font-size="17" font-weight="800" fill="#17324d">Robot Videos</text>
    </g>

    <g transform="translate(294 148)">
      <rect width="230" height="190" rx="24" fill="#ffffff" stroke="#d7e4ef"/>
      <text x="28" y="43" font-size="18" font-weight="800" fill="#17324d">MoE Video DiT</text>
      <g transform="translate(28 68)">
        <rect width="48" height="58" rx="13" fill="#eaf3fb" stroke="#b8cbe0"/>
        <rect x="62" width="48" height="58" rx="13" fill="#e8f7f0" stroke="#a8d8c6"/>
        <rect x="124" width="48" height="58" rx="13" fill="#f2f6fb" stroke="#c8d6e5"/>
        <path d="M24 86 L86 86 L148 86" stroke="#205488" stroke-width="7" stroke-linecap="round"/>
        <circle cx="24" cy="86" r="12" fill="#205488"/>
        <circle cx="86" cy="86" r="12" fill="#20a37f"/>
        <circle cx="148" cy="86" r="12" fill="#205488"/>
      </g>
      <text x="28" y="163" font-size="14" font-weight="700" fill="#55708a">sparse experts + scalable pretraining</text>
    </g>

    <g transform="translate(575 128)">
      <rect width="270" height="230" rx="26" fill="#ffffff" stroke="#d7e4ef"/>
      <text x="28" y="44" font-size="18" font-weight="800" fill="#17324d">Post-training Alignment</text>
      <g transform="translate(28 76)">
        <rect width="214" height="36" rx="18" fill="#edf6ff"/>
        <rect y="52" width="214" height="36" rx="18" fill="#edf9f3"/>
        <rect y="104" width="214" height="36" rx="18" fill="#f5f8fb"/>
        <text x="18" y="24" font-size="14" font-weight="800" fill="#205488">Reward: physical rationality</text>
        <text x="18" y="76" font-size="14" font-weight="800" fill="#1d866d">Reward: task completion</text>
        <text x="18" y="128" font-size="14" font-weight="800" fill="#55708a">RL framework</text>
      </g>
      <path d="M72 184 C115 206 174 204 216 178" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
      <path d="M211 178 L229 173 L219 190 Z" fill="#20a37f"/>
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M252 242 L281 242"/>
    <path d="M533 242 L562 242"/>
  </g>
</svg>
